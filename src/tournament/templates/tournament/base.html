<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mario Kart Tournament{% endblock %}</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mk-red:    #e53e3e;
      --mk-blue:   #2b6cb0;
      --mk-yellow: #d69e2e;
      --mk-green:  #276749;
      --bg:        #1a202c;
      --surface:   #2d3748;
      --surface2:  #4a5568;
      --text:      #e2e8f0;
      --text-muted:#a0aec0;
      --border:    #4a5568;
      --radius:    8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
    }

    a { color: #63b3ed; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ------------------------------------------------------------------ */
    /* Layout                                                               */
    /* ------------------------------------------------------------------ */
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0 1.5rem;
      border-bottom: 2px solid var(--border);
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--mk-yellow);
    }

    .badge {
      background: var(--mk-red);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .badge-viewer { background: var(--mk-blue); }

    /* ------------------------------------------------------------------ */
    /* Tabs                                                                 */
    /* ------------------------------------------------------------------ */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border);
    }

    .tab {
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius) var(--radius) 0 0;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-muted);
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .tab:hover { color: var(--text); background: var(--surface); text-decoration: none; }
    .tab.active { color: var(--mk-yellow); background: var(--surface); border-bottom: 2px solid var(--mk-yellow); }

    /* ------------------------------------------------------------------ */
    /* Cards & panels                                                       */
    /* ------------------------------------------------------------------ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.75rem; color: var(--mk-yellow); }

    /* ------------------------------------------------------------------ */
    /* Forms                                                                */
    /* ------------------------------------------------------------------ */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.35rem; color: var(--text-muted); }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: 2px solid var(--mk-yellow);
      border-color: transparent;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.2rem;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; text-decoration: none; }
    .btn-primary { background: var(--mk-red); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.85rem; }

    /* ------------------------------------------------------------------ */
    /* Grid (group stage)                                                   */
    /* ------------------------------------------------------------------ */
    .stage-grid {
      display: grid;
      gap: 1rem;
    }

    .round-row {
      display: grid;
      grid-template-columns: auto repeat(var(--switch-count, 2), 1fr);
      gap: 0.5rem;
      align-items: start;
    }

    .round-label {
      writing-mode: horizontal-tb;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      text-align: right;
      padding-right: 0.5rem;
      padding-top: 0.5rem;
    }

    .game-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      min-height: 90px;
    }

    .game-cell.complete { border-color: var(--mk-green); }
    .game-cell.voting { border-color: var(--mk-yellow); }
    .game-cell.in_progress { border-color: var(--mk-blue); }
    .game-cell.empty { background: transparent; border: 1px dashed var(--border); }

    .game-cell-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    .game-cell-header .switch-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--surface2);
    }
    .status-dot.complete { background: #68d391; }
    .status-dot.voting { background: var(--mk-yellow); }
    .status-dot.in_progress { background: #63b3ed; }

    .player-list { list-style: none; font-size: 0.85rem; margin-top: 0.25rem; }
    .player-list li { padding: 1px 0; }
    .player-list li .pts { float: right; font-weight: 700; color: var(--mk-yellow); }

    .cup-tag {
      display: inline-block;
      font-size: 0.7rem;
      background: var(--surface2);
      border-radius: 99px;
      padding: 1px 8px;
      margin-top: 0.25rem;
      color: var(--text-muted);
    }

    .game-actions { margin-top: 0.5rem; display: flex; gap: 0.4rem; flex-wrap: wrap; }

    /* ------------------------------------------------------------------ */
    /* Standings table                                                      */
    /* ------------------------------------------------------------------ */
    .standings-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .standings-table th,
    .standings-table td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    .standings-table th { color: var(--text-muted); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table .rank { color: var(--text-muted); font-size: 0.85rem; }
    .standings-table .pts-col { font-weight: 700; color: var(--mk-yellow); }

    /* ------------------------------------------------------------------ */
    /* Bracket                                                              */
    /* ------------------------------------------------------------------ */
    .bracket {
      display: flex;
      gap: 2rem;
      overflow-x: auto;
      padding-bottom: 1rem;
    }

    .bracket-round {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      min-width: 200px;
    }

    .bracket-round-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .bracket-game {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
    }

    .bracket-game.complete { border-color: var(--mk-green); }

    .bracket-player {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      font-size: 0.85rem;
    }

    .bracket-player.advanced { font-weight: 700; color: #68d391; }
    .bracket-player.tbd { color: var(--text-muted); font-style: italic; }

    /* ------------------------------------------------------------------ */
    /* Utility                                                              */
    /* ------------------------------------------------------------------ */
    .mt-1 { margin-top: 0.25rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-4 { margin-top: 1rem; }
    .flex { display: flex; }
    .gap-2 { gap: 0.5rem; }
    .justify-between { justify-content: space-between; }
    .text-muted { color: var(--text-muted); }
    .text-sm { font-size: 0.875rem; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .alert-success { background: #276749; border: 1px solid #48bb78; }
    .alert-info { background: #2a4365; border: 1px solid #63b3ed; }

    /* ------------------------------------------------------------------ */
    /* URL share box                                                        */
    /* ------------------------------------------------------------------ */
    .url-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
