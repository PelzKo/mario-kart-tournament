services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database across container restarts
      - mario_kart_data:/data
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-this-in-production-use-a-long-random-string}
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATA_DIR=/data
    restart: unless-stopped

volumes:
  mario_kart_data:
